services:
  backend:
    build: ./backend
    command: sh -c "echo 'Starting Daphne ASGI server' && python -m daphne -b 0.0.0.0 -p 6000 config.asgi:application"
    volumes:
      - ./backend:/app
      - ./backend/license:/app/license:ro
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LICENSE_AGENT_URL=http://host.docker.internal:7890
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "6000:6000"
    restart: always
    depends_on:
      - redis

  frontend:
    build: ./frontend
    command: ["sh", "-c", "node /app/node_modules/vite/bin/vite.js --host"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "6001:6001"
    env_file:
      - ./backend/.env
    restart: always

  redis:
    image: redis:6-alpine
    restart: unless-stopped

volumes:
  frontend_node_modules:
  
