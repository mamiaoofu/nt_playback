services:
  backend:
    build: ./backend
    # Use Daphne (ASGI) so WebSocket/Channels work reliably behind a proxy
    command: sh -c "echo 'Starting Daphne ASGI server' && python -m daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - redis

  frontend:
    build: ./frontend
    # Run vite via node executable to avoid wrapper/script execution issues on mounted volumes
    command: ["sh", "-c", "node /app/node_modules/vite/bin/vite.js --host"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    restart: always

  redis:
    image: redis:6-alpine
    restart: unless-stopped
    # no volumes/networks required for simple dev setup

volumes:
  frontend_node_modules:
  
